# ======================================================
# ~/.config/hypr/default/APPRules.conf
# 应用程序窗口规则和工作区绑定
# ======================================================
# ---------------------------
# 工作区绑定建议 (5个工作区)
# ---------------------------
# 工作区1: 浏览器
#workspace = 1, persistent:true
#windowrulev2 = workspace 1, class:^(firefox|chromium|google-chrome|microsoft-edge)$

# 工作区2: 终端和开发工具
#workspace = 2, persistent:true
#windowrulev2 = workspace 2, class:^(kitty|Alacritty|Geany|code|jetbrains-.*)$

# 工作区3: 通讯应用
workspace = 3, persistent:true
windowrulev2 = workspace 3, class:^(wechat|qq|discord|slack|telegram)$

# 工作区4: 办公和文档
workspace = 4, persistent:true
windowrulev2 = workspace 4, class:^(libreoffice|onlyoffice|evince|okular)$

# 工作区5: 媒体和娱乐
workspace = 5, persistent:true
windowrulev2 = workspace 5, class:^(vlc|spotify|steam)$

# ---------------------------
# 其他优化规则
# ---------------------------
# 通知中心
windowrulev2 = float, class:^(swaync)$
windowrulev2 = move 100%-420 20, class:^(swaync)$
windowrulev2 = nofocus, class:^(swaync)$

# 屏幕截图工具
windowrulev2 = float, class:^(flameshot|grimblast)$
windowrulev2 = move center, class:^(flameshot|grimblast)$
windowrulev2 = pin, class:^(flameshot|grimblast)$

# 启动器 (Rofi)
windowrulev2 = float, class:^(rofi)$
windowrulev2 = move center, class:^(rofi)$
windowrulev2 = pin, class:^(rofi)$

# 文件管理器
windowrulev2 = tile, class:^(thunar|dolphin|nautilus)$
windowrulev2 = workspace 4, class:^(thunar|dolphin|nautilus)$

# 视频会议应用
windowrulev2 = float, class:^(zoom|teams)$
windowrulev2 = size 1000 700, class:^(zoom|teams)$
windowrulev2 = move center, class:^(zoom|teams)$
windowrulev2 = workspace 3, class:^(zoom|teams)$

# 虚拟机窗口
windowrulev2 = tile, class:^(virt-manager|VirtualBox)$
windowrulev2 = size 1200 800, class:^(virt-manager|VirtualBox)$
windowrulev2 = workspace 2, class:^(virt-manager|VirtualBox)$
# ---------------------------
# 系统工具浮动规则
# ---------------------------
# 蓝牙工具
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = size 600 400, class:^(blueman-manager)$
windowrulev2 = move center, class:^(blueman-manager)$

# 输入法工具
windowrulev2 = float, class:^(fcitx-config-gtk3)$
windowrulev2 = size 800 600, class:^(fcitx-config-gtk3)$
windowrulev2 = move center, class:^(fcitx-config-gtk3)$

# 网络管理器 (WiFi)
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = size 800 600, class:^(nm-connection-editor)$
windowrulev2 = move center, class:^(nm-connection-editor)$

# 声音控制
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = size 800 500, class:^(pavucontrol)$
windowrulev2 = move center, class:^(pavucontrol)$

# 系统设置
windowrulev2 = float, class:^(gnome-control-center)$
windowrulev2 = size 1000 700, class:^(gnome-control-center)$
windowrulev2 = move center, class:^(gnome-control-center)$

# 文件选择器
windowrulev2 = float, class:^(org.gtk.*)$
windowrulev2 = size 800 600, class:^(org.gtk.*)$
windowrulev2 = move center, class:^(org.gtk.*)$

# ---------------------------
# 即时通讯应用修复
# ---------------------------
# 微信 (使用 deepin-wine 版本)
windowrulev2 = tile, class:^(wechat)$
windowrulev2 = size 1000 700, class:^(wechat)$
windowrulev2 = workspace 3, class:^(wechat)$

# QQ (使用 deepin-wine 版本)
windowrulev2 = tile, class:^(qq)$
windowrulev2 = size 1000 700, class:^(qq)$
windowrulev2 = workspace 3, class:^(qq)$

# Telegram
windowrulev2 = tile, class:^(org.telegram.*)$
windowrulev2 = size 1000 700, class:^(org.telegram.*)$
windowrulev2 = workspace 3, class:^(org.telegram.*)$

# ---------------------------
# 浏览器画中画模式
# ---------------------------
# Firefox 画中画
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = move 75% 75%, title:^(Picture-in-Picture)$
windowrulev2 = size 25% 25%, title:^(Picture-in-Picture)$

# Chrome/Chromium 画中画
windowrulev2 = float, class:^(chromium|google-chrome|microsoft-edge)$, title:^(画中画|Picture-in-Picture)$
windowrulev2 = pin, class:^(chromium|google-chrome|microsoft-edge)$, title:^(画中画|Picture-in-Picture)$
windowrulev2 = move 75% 75%, class:^(chromium|google-chrome|microsoft-edge)$, title:^(画中画|Picture-in-Picture)$
windowrulev2 = size 25% 25%, class:^(chromium|google-chrome|microsoft-edge)$, title:^(画中画|Picture-in-Picture)$

windowrule=float,^(mpv)$
windowrule=size 800 450,^(mpv)$
windowrule=move center,^(mpv)$
windowrule=animation popin,^(mpv)$

windowrule=float,^(imv)$
windowrule=size 800 450,^(imv)$
windowrule=move center,^(imv)$
windowrule=animation popin,^(imv)$


windowrulev2 = float, class:^(ToDesk)$

